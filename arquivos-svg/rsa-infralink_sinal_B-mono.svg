<svg viewBox="0 0 460 510" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">RSA Infralink — Logo Sinal em Movimento (monocromática)</title>
  <desc id="d">Versão monocromática azul sólido da torre estilizada, sem gradiente, para impressão e fundos claros.</desc>
  <defs>
    <style>
      .sig{stroke:#1a2d6e;stroke-width:7;fill:none;stroke-linecap:round}
      .b{stroke:#1a2d6e;stroke-width:9;fill:none;stroke-linecap:round}
      .bt{stroke:#1a2d6e;stroke-width:6;fill:none;stroke-linecap:round}
      .wordINFRA{font-family:'Space Grotesk','Montserrat',system-ui,sans-serif;font-weight:600;font-size:30px;letter-spacing:9px;text-anchor:middle;fill:#1a2d6e}
      .tag{font-family:'Space Grotesk','Montserrat',system-ui,sans-serif;font-weight:500;font-size:12.5px;letter-spacing:5px;text-anchor:middle;fill:#1a2d6e;opacity:.6}
    </style>
  </defs>
  <g id="sinais">
    <path class="sig" d="M150 118 a52 52 0 0 0 0 88" opacity="0.9"/>
    <path class="sig" d="M128 94 a76 76 0 0 0 0 136" opacity="0.55"/>
    <path class="sig" d="M106 70 a100 100 0 0 0 0 184" opacity="0.28"/>
    <path class="sig" d="M310 118 a52 52 0 0 1 0 88" opacity="0.9"/>
    <path class="sig" d="M332 94 a76 76 0 0 1 0 136" opacity="0.55"/>
    <path class="sig" d="M354 70 a100 100 0 0 1 0 184" opacity="0.28"/>
  </g>
  <g id="torre">
