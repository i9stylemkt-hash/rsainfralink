    <line class="b" x1="230" y1="102" x2="190" y2="310"/>
    <line class="b" x1="230" y1="102" x2="270" y2="310"/>
    <line class="bt" x1="214" y1="168" x2="246" y2="168"/>
    <line class="bt" x1="207" y1="223" x2="253" y2="223"/>
    <line class="bt" x1="200" y1="278" x2="260" y2="278"/>
    <line class="b" x1="184" y1="316" x2="276" y2="316"/>
