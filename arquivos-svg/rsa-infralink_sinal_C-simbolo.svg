    <line x1="84" y1="112" x2="116" y2="112" stroke="url(#gT)" stroke-width="7" stroke-linecap="round"/>
    <line x1="76" y1="150" x2="124" y2="150" stroke="url(#gT)" stroke-width="7" stroke-linecap="round"/>
