<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">RSA Infralink — Símbolo Sinal em Movimento (isolado)</title>
  <desc id="d">Símbolo isolado da torre estilizada com gradiente e ondas, para favicon e app icon. Fundo transparente.</desc>
  <defs>
    <linearGradient id="gT" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1a2d6e"/><stop offset="0.5" stop-color="#2f6dae"/><stop offset="1" stop-color="#f47b20"/>
    </linearGradient>
    <linearGradient id="gS" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#2f6dae"/><stop offset="0.55" stop-color="#3a86c0"/><stop offset="1" stop-color="#f47b20"/>
    </linearGradient>
    <style>.sig{stroke:url(#gS);stroke-width:8;fill:none;stroke-linecap:round}</style>
  </defs>
  <g id="sinais">
