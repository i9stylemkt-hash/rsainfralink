    <line class="ltthin" x1="86" y1="174" x2="92" y2="180"/>
    <line class="ltthin" x1="124" y1="174" x2="118" y2="180"/>
  </g>
  <g id="lettermark">
    <text x="214" y="109" class="wordRSA"><tspan class="lt">RS</tspan><tspan class="or">A</tspan></text>
    <text x="216" y="141" class="wordINFRA">INFRALINK</text>
  </g>
  <g id="tagline">
    <text x="217" y="167" class="tag">TELECOMUNICAÇÕES · RS · SC · PR</text>
  </g>
