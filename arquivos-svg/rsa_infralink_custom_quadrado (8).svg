<svg id="vector-logo-quadrado" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="100%" height="100%">
  
  <style type="text/css">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Montserrat:wght@400;500;700;800&amp;family=Outfit:wght@400;500;700;800&amp;family=Playfair+Display:wght@400;700;800&amp;family=Space+Grotesk:wght@400;500;700;800&amp;family=Syne:wght@400;700;800&amp;display=swap');
    .text-title {
      font-family: 'Outfit', 'Space Grotesk', sans-serif;
      font-size: 50px;
      letter-spacing: 1px;
    }
    .text-subtitle {
      font-family: 'Playfair Display', 'Inter', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
    }
  </style>

  <rect width="240" height="320" fill="#0b0f19" />
  
        <g transform="translate(20, 10) translate(100, 110) scale(1) translate(-100, -110)" stroke-linecap="round" stroke-linejoin="round">
          <!-- Ondas de Transmissão Esquerda (Curva simétrica baseada no wavesSpread) -->
          <path d="M 74,40 Q 43,65 74,90" fill="none" stroke="#ff5a1f" stroke-width="2.5" />
          <path d="M 64,25 Q 12,65 64,105" fill="none" stroke="#ff5a1f" stroke-width="3" />
          <path d="M 54,10 Q -19,65 54,120" fill="none" stroke="#ff5a1f" stroke-width="3.5" />

          <!-- Ondas de Transmissão Direitas (Curva simétrica) -->
          <path d="M 126,40 Q 157,65 126,90" fill="none" stroke="#ff5a1f" stroke-width="2.5" />
          <path d="M 136,25 Q 188,65 136,105" fill="none" stroke="#ff5a1f" stroke-width="3" />
          <path d="M 146,10 Q 219,65 146,120" fill="none" stroke="#ff5a1f" stroke-width="3.5" />

          <!-- Mastro Fino de Topo -->
          <line x1="100" y1="70" x2="100" y2="30" stroke="#f8fafc" stroke-width="5" />
          <circle cx="100" cy="25" r="6" fill="#f8fafc" />

          <!-- Prumos de sustentação lateral móveis -->
          <line x1="100" y1="70" x2="54" y2="159" stroke="#f8fafc" stroke-width="7" />
          <line x1="100" y1="70" x2="146" y2="159" stroke="#f8fafc" stroke-width="7" />

          <!-- Travessas horizontais de amarração técnica -->
          <line x1="81" y1="106" x2="119" y2="106" stroke="#f8fafc" stroke-width="4.5" />
          <line x1="66" y1="135" x2="134" y2="135" stroke="#f8fafc" stroke-width="4.5" />
          <line x1="54" y1="159" x2="146" y2="159" stroke="#f8fafc" stroke-width="5" />

          <!-- Treliças de Suporte de Engenharia (Cravadas em Cruz) -->
          <line x1="81" y1="106" x2="134" y2="135" stroke="#f8fafc" stroke-width="3" />
          <line x1="119" y1="106" x2="66" y2="135" stroke="#f8fafc" stroke-width="3" />
          <line x1="66" y1="135" x2="146" y2="159" stroke="#f8fafc" stroke-width="3" />
          <line x1="134" y1="135" x2="54" y2="159" stroke="#f8fafc" stroke-width="3" />
        </g>
      
  <g transform="translate(0, 0) translate(120, 260) scale(1) translate(-120, -260)">
    <text x="120" y="240" text-anchor="middle" class="text-title" font-weight="800" fill="#ffffff">RSA</text>
    <text x="120" y="275" text-anchor="middle" class="text-subtitle" font-weight="700" fill="#94a3b8">INFRALINK</text>
    
    <!-- Sublinhado geométrico de amarra de prumo -->
    <line x1="40" y1="295" x2="200" y2="295" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" />
  </g>
  
</svg>