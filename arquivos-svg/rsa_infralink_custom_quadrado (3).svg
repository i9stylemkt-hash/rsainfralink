<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="100%" height="100%">
    <rect width="240" height="320" fill="#f47b20"></rect>
    
                <g transform="translate(20, 10)" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Ondas de Transmissão Esquerdas (Arqueadas Q-Bezier para esquerda) -->
                    <path d="M 75,40 Q 55,65 75,90" fill="none" stroke="#1f4af4" stroke-width="2"></path>
                    <path d="M 65,25 Q 35,65 65,105" fill="none" stroke="#1f4af4" stroke-width="2.5"></path>
                    <path d="M 55,10 Q 15,65 55,120" fill="none" stroke="#1f4af4" stroke-width="3"></path>

                    <!-- Ondas de Transmissão Direitas (Arqueadas Q-Bezier para direita) -->
                    <path d="M 125,40 Q 145,65 125,90" fill="none" stroke="#1f4af4" stroke-width="2"></path>
                    <path d="M 135,25 Q 165,65 135,105" fill="none" stroke="#1f4af4" stroke-width="2.5"></path>
                    <path d="M 145,10 Q 185,65 145,120" fill="none" stroke="#1f4af4" stroke-width="3"></path>

                    <!-- Mastro Fino Superior -->
                    <line x1="100" y1="70" x2="100" y2="30" stroke="#f8f7f7" stroke-width="5"></line>
                    <circle cx="100" cy="25" r="6" fill="#f8f7f7"></circle>

                    <!-- Prumos Diagonais Robustos -->
                    <line x1="100" y1="70" x2="65" y2="180" stroke="#f8f7f7" stroke-width="5.5"></line>
                    <line x1="100" y1="70" x2="135" y2="180" stroke="#f8f7f7" stroke-width="5.5"></line>

                    <!-- Travessas Horizontais (Máximo 3) -->
                    <line x1="86" y1="115" x2="114" y2="115" stroke="#f8f7f7" stroke-width="4"></line>
                    <line x1="75" y1="150" x2="125" y2="150" stroke="#f8f7f7" stroke-width="4.5"></line>
                    <line x1="66" y1="180" x2="134" y2="180" stroke="#f8f7f7" stroke-width="5"></line>

                    <!-- Treliças de Suporte de Engenharia (Diag. Cruzadas) -->
                    <line x1="86" y1="115" x2="114" y2="150" stroke="#f8f7f7" stroke-width="3"></line>
                    <line x1="114" y1="115" x2="86" y2="150" stroke="#f8f7f7" stroke-width="3"></line>
                    <line x1="75" y1="150" x2="125" y2="180" stroke="#f8f7f7" stroke-width="3"></line>
                    <line x1="125" y1="150" x2="75" y2="180" stroke="#f8f7f7" stroke-width="3"></line>
                </g>
            
    <!-- Bloco Tipográfico Centralizado Abaixo -->
    <g>
        <text x="120" y="240" text-anchor="middle" font-family="'Space Grotesk', 'Montserrat', Arial, sans-serif" font-size="44" font-weight="800" fill="#0744b5">RSA</text>
        <text x="120" y="275" text-anchor="middle" font-family="'Space Grotesk', 'Montserrat', Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="4" fill="#fcfcfd">INFRALINK</text>
        
        <!-- Sublinhado de Prumo -->
        <line x1="40" y1="295" x2="200" y2="295" stroke="#0744b5" stroke-width="3.5" stroke-linecap="round"></line>
    </g>
</svg>