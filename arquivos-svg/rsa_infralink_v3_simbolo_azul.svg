<svg id="vector-logo-simbolo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  
<defs>
  <!-- Filtro de Sombra Recalibrada (Drop Shadow) -->
  <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
  </filter>
  <!-- Filtro Neon Glow de Torre (Brilho Fluorescente) -->
  <filter id="neon-glow-tower" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="6" result="blur1" />
    <feGaussianBlur stdDeviation="16" result="blur2" />
    <feMerge>
      <feMergeNode in="blur2" />
      <feMergeNode in="blur1" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>
</defs>
<style type="text/css">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Montserrat:wght@400;500;700;800&amp;family=Outfit:wght@400;500;700;800&amp;family=Playfair+Display:wght@400;700;800&amp;family=Space+Grotesk:wght@400;500;700;800&amp;family=Syne:wght@400;700;800&amp;display=swap');
  .text-title {
    font-family: 'Space Grotesk', 'Space Grotesk', sans-serif;
    font-size: 44px;
    letter-spacing: 0px;
  }
  .text-subtitle {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 19px;
    letter-spacing: 4px;
  }
</style>

  <rect width="200" height="200" fill="#1a2d6e" />
  
      <g transform="translate(0, 0) translate(100, 110) scale(1) translate(-100, -110) " stroke-linecap="round" stroke-linejoin="round" >
        
        <!-- Ondas de Transmissão Esquerda (Curva simétrica parametrizada com base no wavesSpread) -->
        <path d="M 75,40 Q 45,65 75,90" fill="none" stroke="#f47b20" stroke-width="3"  />
        <path d="M 65,25 Q 15,65 65,105" fill="none" stroke="#f47b20" stroke-width="3.5"  />
        <path d="M 55,10 Q -15,65 55,120" fill="none" stroke="#f47b20" stroke-width="4"  />

        <!-- Ondas de Transmissão Direitas (Curva simétrica espelhada) -->
        <path d="M 125,40 Q 155,65 125,90" fill="none" stroke="#f47b20" stroke-width="3"  />
        <path d="M 135,25 Q 185,65 135,105" fill="none" stroke="#f47b20" stroke-width="3.5"  />
        <path d="M 145,10 Q 215,65 145,120" fill="none" stroke="#f47b20" stroke-width="4"  />

        <!-- Mastro Fino de Topo -->
        <line x1="100" y1="70" x2="100" y2="30" stroke="#faf9f5" stroke-width="5"  />
        <circle cx="100" cy="25" r="6" fill="#faf9f5" stroke="none" stroke-width="0"  />

        <!-- Prumos de sustentação lateral móveis auto-portantes -->
        <line x1="100" y1="70" x2="65" y2="180" stroke="#faf9f5" stroke-width="7"  />
        <line x1="100" y1="70" x2="135" y2="180" stroke="#faf9f5" stroke-width="7"  />

        <!-- Travessas horizontais de amarra e reforço térmico -->
        <line x1="86" y1="115" x2="114" y2="115" stroke="#faf9f5" stroke-width="4.5"  />
        <line x1="75" y1="150" x2="125" y2="150" stroke="#faf9f5" stroke-width="4.5"  />
        <line x1="65" y1="180" x2="135" y2="180" stroke="#faf9f5" stroke-width="5"  />

        <!-- Treliças de reforço interno de engenharia (X cravado simétrico) -->
        <line x1="86" y1="115" x2="125" y2="150" stroke="#faf9f5" stroke-width="3"  />
        <line x1="114" y1="115" x2="75" y2="150" stroke="#faf9f5" stroke-width="3"  />
        <line x1="75" y1="150" x2="135" y2="180" stroke="#faf9f5" stroke-width="3"  />
        <line x1="125" y1="150" x2="65" y2="180" stroke="#faf9f5" stroke-width="3"  />
        
      </g>
    
  
</svg>