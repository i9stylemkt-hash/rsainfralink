<svg id="vector-logo-horizontal" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="100%" height="100%">
  
<defs>
  <!-- Filtro de Sombra Recalibrada (Drop Shadow) -->
  <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
  </filter>
  <!-- Filtro Neon Glow de Torre (Brilho Fluorescente) -->
  <filter id="neon-glow-tower" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="6" result="blur1" />
    <feGaussianBlur stdDeviation="16" result="blur2" />
    <feMerge>
      <feMergeNode in="blur2" />
      <feMergeNode in="blur1" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>
</defs>
<style type="text/css">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Montserrat:wght@400;500;700;800&amp;family=Outfit:wght@400;500;700;800&amp;family=Playfair+Display:wght@400;700;800&amp;family=Space+Grotesk:wght@400;500;700;800&amp;family=Syne:wght@400;700;800&amp;display=swap');
  .text-title {
    font-family: 'Space Grotesk', 'Space Grotesk', sans-serif;
    font-size: 58px;
    letter-spacing: 0px;
  }
  .text-subtitle {
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
  }
</style>

  <rect width="480" height="200" fill="#080808" />
  
      <g transform="translate(10, 0) translate(100, 110) scale(1) translate(-100, -110) " stroke-linecap="round" stroke-linejoin="round" >
        
        <!-- Ondas de Transmissão Esquerda (Curva simétrica parametrizada com base no wavesSpread) -->
        <path d="M 78,40 Q 51,65 78,90" fill="none" stroke="#155dfc" stroke-width="1"  />
        <path d="M 68,25 Q 24,65 68,105" fill="none" stroke="#155dfc" stroke-width="1.5"  />
        <path d="M 58,10 Q -3,65 58,120" fill="none" stroke="#155dfc" stroke-width="2"  />

        <!-- Ondas de Transmissão Direitas (Curva simétrica espelhada) -->
        <path d="M 122,40 Q 149,65 122,90" fill="none" stroke="#155dfc" stroke-width="1"  />
        <path d="M 132,25 Q 176,65 132,105" fill="none" stroke="#155dfc" stroke-width="1.5"  />
        <path d="M 142,10 Q 203,65 142,120" fill="none" stroke="#155dfc" stroke-width="2"  />

        <!-- Mastro Fino de Topo -->
        <line x1="100" y1="70" x2="100" y2="30" stroke="#d28a0f" stroke-width="7"  />
        <circle cx="100" cy="25" r="6" fill="#d28a0f" stroke="none" stroke-width="0"  />

        <!-- Prumos de sustentação lateral móveis auto-portantes -->
        <line x1="100" y1="70" x2="52" y2="207" stroke="#d28a0f" stroke-width="7"  />
        <line x1="100" y1="70" x2="148" y2="207" stroke="#d28a0f" stroke-width="7"  />

        <!-- Travessas horizontais de amarra e reforço térmico -->
        <line x1="80" y1="126" x2="120" y2="126" stroke="#d28a0f" stroke-width="3"  />
        <line x1="65" y1="170" x2="135" y2="170" stroke="#d28a0f" stroke-width="3"  />
        <line x1="52" y1="207" x2="148" y2="207" stroke="#d28a0f" stroke-width="3.5"  />

        <!-- Treliças de reforço interno de engenharia (X cravado simétrico) -->
        <line x1="80" y1="126" x2="135" y2="170" stroke="#d28a0f" stroke-width="3"  />
        <line x1="120" y1="126" x2="65" y2="170" stroke="#d28a0f" stroke-width="3"  />
        <line x1="65" y1="170" x2="148" y2="207" stroke="#d28a0f" stroke-width="3"  />
        <line x1="135" y1="170" x2="52" y2="207" stroke="#d28a0f" stroke-width="3"  />
        
      </g>
    
  <g transform="translate(200, 0) translate(125, 100) scale(1) translate(-125, -100)">
    <text x="0" y="95" class="text-title" font-weight="800" fill="#d28a0f">RSA</text>
    <text x="0" y="142" class="text-subtitle" font-weight="700" fill="#155dfc">INFRALINK</text>
    
    <!-- Detalhe decorativo de régua de precisão inspirado no manual de empreendimentos -->
    <line x1="0" y1="160" x2="250" y2="160" stroke="#d28a0f" stroke-width="4" stroke-linecap="round" />
    <line x1="258" y1="160" x2="270" y2="160" stroke="#d28a0f" stroke-width="4" stroke-dasharray="4,2" />
  </g>
  
</svg>