<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">RSA Infralink — Símbolo Sinal em Movimento (avatar/app icon)</title>
  <desc id="desc">Símbolo isolado com gradiente azul #1a2d6e para laranja #f47b20: torre estilizada e arcos de sinal, sem texto. Para avatar e app icon. Fundo transparente.</desc>
  <defs>
    <linearGradient id="gTower" gradientUnits="userSpaceOnUse" x1="200" y1="300" x2="200" y2="88">
      <stop offset="0" stop-color="#16265f"/><stop offset="0.45" stop-color="#1a2d6e"/><stop offset="1" stop-color="#f47b20"/>
    </linearGradient>
  </defs>
  <g id="simbolo" transform="translate(-36.9,-52.9) scale(0.903)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g id="torre" stroke="url(#gTower)">
      <path d="M178 300L196 132 M222 300L204 132" stroke-width="10"/>
      <path d="M184 272L216 272 M190 222L210 222 M195 175L205 175" stroke-width="7"/>
      <path d="M200 132L200 92" stroke-width="8"/>
      <path d="M189 130L183 96 M211 130L217 96" stroke-width="7"/>
      <circle cx="200" cy="88" r="5" fill="url(#gTower)" stroke="none"/>
    </g>
    <g id="sinais" stroke="url(#gTower)" stroke-width="6">
      <path d="M168 150Q150 205 168 260"/>
      <path d="M160 134Q138 205 160 276"/>
      <path d="M152 118Q126 205 152 292"/>
    </g>
  </g>
</svg>
