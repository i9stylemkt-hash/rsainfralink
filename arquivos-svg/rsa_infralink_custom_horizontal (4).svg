<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="100%" height="100%">
    <rect width="480" height="200" fill="#f47b20"></rect>
    
                <g transform="translate(10, 0)" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Ondas de Transmissão Esquerdas (Arqueadas Q-Bezier para esquerda) -->
                    <path d="M 75,40 Q 55,65 75,90" fill="none" stroke="#0e2b81" stroke-width="2"></path>
                    <path d="M 65,25 Q 35,65 65,105" fill="none" stroke="#0e2b81" stroke-width="2.5"></path>
                    <path d="M 55,10 Q 15,65 55,120" fill="none" stroke="#0e2b81" stroke-width="3"></path>

                    <!-- Ondas de Transmissão Direitas (Arqueadas Q-Bezier para direita) -->
                    <path d="M 125,40 Q 145,65 125,90" fill="none" stroke="#0e2b81" stroke-width="2"></path>
                    <path d="M 135,25 Q 165,65 135,105" fill="none" stroke="#0e2b81" stroke-width="2.5"></path>
                    <path d="M 145,10 Q 185,65 145,120" fill="none" stroke="#0e2b81" stroke-width="3"></path>

                    <!-- Mastro Fino Superior -->
                    <line x1="100" y1="70" x2="100" y2="30" stroke="#0d0c0c" stroke-width="5"></line>
                    <circle cx="100" cy="25" r="6" fill="#0d0c0c"></circle>

                    <!-- Prumos Diagonais Robustos -->
                    <line x1="100" y1="70" x2="65" y2="180" stroke="#0d0c0c" stroke-width="5.5"></line>
                    <line x1="100" y1="70" x2="135" y2="180" stroke="#0d0c0c" stroke-width="5.5"></line>

                    <!-- Travessas Horizontais (Máximo 3) -->
                    <line x1="86" y1="115" x2="114" y2="115" stroke="#0d0c0c" stroke-width="4"></line>
                    <line x1="75" y1="150" x2="125" y2="150" stroke="#0d0c0c" stroke-width="4.5"></line>
                    <line x1="66" y1="180" x2="134" y2="180" stroke="#0d0c0c" stroke-width="5"></line>

                    <!-- Treliças de Suporte de Engenharia (Diag. Cruzadas) -->
                    <line x1="86" y1="115" x2="114" y2="150" stroke="#0d0c0c" stroke-width="3"></line>
                    <line x1="114" y1="115" x2="86" y2="150" stroke="#0d0c0c" stroke-width="3"></line>
                    <line x1="75" y1="150" x2="125" y2="180" stroke="#0d0c0c" stroke-width="3"></line>
                    <line x1="125" y1="150" x2="75" y2="180" stroke="#0d0c0c" stroke-width="3"></line>
                </g>
            
    <!-- Bloco Tipográfico à direita -->
    <g transform="translate(200, 0)">
        <text x="0" y="95" font-family="'Space Grotesk', 'Montserrat', Arial, sans-serif" font-size="58" font-weight="800" fill="#0e2b81">RSA</text>
        <text x="0" y="142" font-family="'Space Grotesk', 'Montserrat', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4" fill="#0c0c0d">INFRALINK</text>
        
        <!-- Detalhe decorativo de linha de precisão similar à marca de empreendimentos -->
        <line x1="0" y1="160" x2="250" y2="160" stroke="#0e2b81" stroke-width="4" stroke-linecap="round"></line>
        <line x1="258" y1="160" x2="270" y2="160" stroke="#0e2b81" stroke-width="4" stroke-dasharray="4,2"></line>
    </g>
</svg>