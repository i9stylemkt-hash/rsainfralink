<svg id="vector-logo-horizontal" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="100%" height="100%">
  
  <style type="text/css">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Montserrat:wght@400;500;700;800&amp;family=Outfit:wght@400;500;700;800&amp;family=Playfair+Display:wght@400;700;800&amp;family=Space+Grotesk:wght@400;500;700;800&amp;family=Syne:wght@400;700;800&amp;display=swap');
    .text-title {
      font-family: 'Space Grotesk', 'Space Grotesk', sans-serif;
      font-size: 58px;
      letter-spacing: 0px;
    }
    .text-subtitle {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
    }
  </style>

  <rect width="480" height="200" fill="#0a0a0a" />
  
        <g transform="translate(10, 0) translate(100, 110) scale(1) translate(-100, -110)" stroke-linecap="round" stroke-linejoin="round">
          <!-- Ondas de Transmissão Esquerda (Curva simétrica baseada no wavesSpread) -->
          <path d="M 74,40 Q 43,65 74,90" fill="none" stroke="#f47b20" stroke-width="2.5" />
          <path d="M 64,25 Q 12,65 64,105" fill="none" stroke="#f47b20" stroke-width="3" />
          <path d="M 54,10 Q -19,65 54,120" fill="none" stroke="#f47b20" stroke-width="3.5" />

          <!-- Ondas de Transmissão Direitas (Curva simétrica) -->
          <path d="M 126,40 Q 157,65 126,90" fill="none" stroke="#f47b20" stroke-width="2.5" />
          <path d="M 136,25 Q 188,65 136,105" fill="none" stroke="#f47b20" stroke-width="3" />
          <path d="M 146,10 Q 219,65 146,120" fill="none" stroke="#f47b20" stroke-width="3.5" />

          <!-- Mastro Fino de Topo -->
          <line x1="100" y1="70" x2="100" y2="30" stroke="#155dfc" stroke-width="5" />
          <circle cx="100" cy="25" r="6" fill="#155dfc" />

          <!-- Prumos de sustentação lateral móveis -->
          <line x1="100" y1="70" x2="54" y2="159" stroke="#155dfc" stroke-width="7" />
          <line x1="100" y1="70" x2="146" y2="159" stroke="#155dfc" stroke-width="7" />

          <!-- Travessas horizontais de amarração técnica -->
          <line x1="81" y1="106" x2="119" y2="106" stroke="#155dfc" stroke-width="4.5" />
          <line x1="66" y1="135" x2="134" y2="135" stroke="#155dfc" stroke-width="4.5" />
          <line x1="54" y1="159" x2="146" y2="159" stroke="#155dfc" stroke-width="5" />

          <!-- Treliças de Suporte de Engenharia (Cravadas em Cruz) -->
          <line x1="81" y1="106" x2="134" y2="135" stroke="#155dfc" stroke-width="3" />
          <line x1="119" y1="106" x2="66" y2="135" stroke="#155dfc" stroke-width="3" />
          <line x1="66" y1="135" x2="146" y2="159" stroke="#155dfc" stroke-width="3" />
          <line x1="134" y1="135" x2="54" y2="159" stroke="#155dfc" stroke-width="3" />
        </g>
      
  <g transform="translate(200, 0) translate(125, 100) scale(1) translate(-125, -100)">
    <text x="0" y="95" class="text-title" font-weight="800" fill="#f47b20">RSA</text>
    <text x="0" y="142" class="text-subtitle" font-weight="700" fill="#155dfc">INFRALINK</text>
    
    <!-- Detalhe decorativo de régua de precisão inspirado no manual de empreendimentos -->
    <line x1="0" y1="160" x2="250" y2="160" stroke="#f47b20" stroke-width="4" stroke-linecap="round" />
    <line x1="258" y1="160" x2="270" y2="160" stroke="#f47b20" stroke-width="4" stroke-dasharray="4,2" />
  </g>
  
</svg>